<ion-content [fullscreen]="true" class="bg-background text-on-background font-body min-h-screen flex flex-col overflow-hidden">
  <header class="fixed top-0 left-0 w-full px-6 py-8 flex justify-between items-center z-50">
    <div class="text-xl font-black text-indigo-700 tracking-tighter font-headline">SmartBook</div>
    <a class="text-on-surface-variant font-semibold text-sm hover:text-primary transition-colors duration-200" routerLink="/login">Skip</a>
  </header>

  <main class="flex-1 flex flex-col justify-center px-8 max-w-lg mx-auto w-full relative">
    <div class="relative w-full aspect-square mb-12">
      <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[120%] h-[120%] bg-indigo-50/50 rounded-full blur-3xl -z-10"></div>

      <div class="relative w-full h-full">
        <div class="absolute top-[10%] left-[5%] w-[80%] bg-surface-container-lowest rounded-lg shadow-xl shadow-indigo-100/30 p-6 z-20 transform -rotate-2">
          <div class="flex items-center gap-4 mb-4">
            <div class="w-12 h-12 bg-primary-container/10 rounded-full flex items-center justify-center text-primary">
              <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">calendar_month</span>
            </div>
            <div>
              <div class="text-xs text-on-surface-variant font-label uppercase tracking-widest">Available Slots</div>
              <div class="font-headline font-bold text-on-surface">Choose a Time</div>
            </div>
          </div>
          <div class="grid grid-cols-3 gap-2">
            <div class="bg-surface-container-high rounded-full py-2 text-center text-xs font-semibold text-primary">09:00</div>
            <div class="bg-primary text-white rounded-full py-2 text-center text-xs font-semibold">10:30</div>
            <div class="bg-surface-container-high rounded-full py-2 text-center text-xs font-semibold text-primary">14:00</div>
          </div>
        </div>

        <div class="absolute bottom-[15%] right-[5%] w-[60%] bg-white/80 glass-effect rounded-lg shadow-2xl shadow-indigo-900/10 p-5 z-30 transform rotate-3 border border-white/50">
          <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-green-500 rounded-full flex items-center justify-center text-white">
              <span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">check</span>
            </div>
            <span class="text-sm font-bold text-on-surface">Booking Confirmed!</span>
          </div>
        </div>

        <div class="absolute top-[45%] right-0 w-32 h-40 rounded-xl overflow-hidden shadow-lg transform rotate-6 border-4 border-white">
          <img class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBpvzSC-76M1SV8zWDwC8UdHWOZvfcMCtkrLjU6x18jrJmWK7gQvCUVQhLWe5x9ibce81fk7sRB19AHggTTydqxTXifriZMrF965HrZSbx20APREO0OGf9McwxVFKJH4BaK-RPwLPZ_XUnqeBtlPHb1G5FonDezdbLM6YMCJ0wmmVD8sAd3d8zgbsQkDXEcnDmfBpT3E_SpTPBaFHCyI0L3p2c5AkkxNdLtZTtKFPTqysdCN2EaGQUhBRpCIMLjhoM-bgCMG1PC3xdy"/>
        </div>
      </div>
    </div>

    <div class="space-y-4 text-center md:text-left">
      <h1 class="font-headline text-4xl font-extrabold tracking-tight text-on-surface leading-[1.1]">
        Book appointments <br />
        <span class="bg-gradient-to-r from-primary to-primary-container bg-clip-text text-transparent">in seconds</span>
      </h1>
      <p class="text-on-surface-variant text-lg leading-relaxed max-w-sm mx-auto md:mx-0">
        Check availability and confirm your booking instantly. Our smart engine handles the rest.
      </p>
    </div>
  </main>

  <footer class="p-8 pb-12 flex flex-col items-center gap-10">
    <div class="flex gap-3">
      <div class="w-2 h-2 rounded-full bg-outline-variant"></div>
      <div class="w-8 h-2 rounded-full bg-primary"></div>
      <div class="w-2 h-2 rounded-full bg-outline-variant"></div>
    </div>
    <div class="w-full max-w-xs flex justify-center">
      <a class="w-full py-5 bg-gradient-to-r from-primary to-primary-container text-on-primary font-headline font-bold text-lg rounded-xl shadow-xl shadow-indigo-200/50 hover:opacity-90 active:scale-95 transition-all duration-200 flex items-center justify-center gap-3" routerLink="/onboarding-3">
        Continue
        <span class="material-symbols-outlined">arrow_forward</span>
      </a>
    </div>
  </footer>
</ion-content>
