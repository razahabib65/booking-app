<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SmartBook Onboarding - Quick Booking</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;600;700;800&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-high": "#eae6f4",
                        "inverse-on-surface": "#f3effc",
                        "on-error-container": "#93000a",
                        "background": "#fcf8ff",
                        "on-tertiary": "#ffffff",
                        "on-secondary-container": "#454386",
                        "on-primary": "#ffffff",
                        "inverse-primary": "#c3c0ff",
                        "surface-bright": "#fcf8ff",
                        "surface-container-lowest": "#ffffff",
                        "primary-fixed-dim": "#c3c0ff",
                        "secondary-fixed": "#e2dfff",
                        "on-error": "#ffffff",
                        "on-primary-fixed": "#0f0069",
                        "error-container": "#ffdad6",
                        "tertiary-container": "#a44100",
                        "primary-container": "#4f46e5",
                        "surface-container": "#f0ecf9",
                        "outline": "#777587",
                        "secondary-container": "#b6b4ff",
                        "on-background": "#1b1b24",
                        "tertiary-fixed": "#ffdbcc",
                        "on-surface": "#1b1b24",
                        "surface-tint": "#4d44e3",
                        "outline-variant": "#c7c4d8",
                        "on-secondary-fixed-variant": "#413f82",
                        "on-tertiary-fixed-variant": "#7b2f00",
                        "on-primary-fixed-variant": "#3323cc",
                        "tertiary": "#7e3000",
                        "error": "#ba1a1a",
                        "on-secondary-fixed": "#140f54",
                        "primary-fixed": "#e2dfff",
                        "surface-container-highest": "#e4e1ee",
                        "on-secondary": "#ffffff",
                        "surface-dim": "#dcd8e5",
                        "on-primary-container": "#dad7ff",
                        "surface-container-low": "#f5f2ff",
                        "tertiary-fixed-dim": "#ffb695",
                        "primary": "#3525cd",
                        "surface-variant": "#e4e1ee",
                        "on-tertiary-fixed": "#351000",
                        "on-tertiary-container": "#ffd2be",
                        "on-surface-variant": "#464555",
                        "inverse-surface": "#302f39",
                        "surface": "#fcf8ff",
                        "secondary": "#58579b",
                        "secondary-fixed-dim": "#c3c0ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-effect {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body min-h-screen flex flex-col overflow-hidden">
<!-- Top Navigation Bar -->
<header class="fixed top-0 left-0 w-full px-6 py-8 flex justify-between items-center z-50">
<div class="text-xl font-black text-indigo-700 tracking-tighter font-headline">SmartBook</div>
<button class="text-on-surface-variant font-semibold text-sm hover:text-primary transition-colors duration-200">
            Skip
        </button>
</header>
<main class="flex-1 flex flex-col justify-center px-8 max-w-lg mx-auto w-full relative">
<!-- Illustration Area (Asymmetric Layout) -->
<div class="relative w-full aspect-square mb-12">
<!-- Background Decorative Shape -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[120%] h-[120%] bg-indigo-50/50 rounded-full blur-3xl -z-10"></div>
<!-- Main Illustration Component -->
<div class="relative w-full h-full">
<!-- Floating Booking Card -->
<div class="absolute top-[10%] left-[5%] w-[80%] bg-surface-container-lowest rounded-lg shadow-xl shadow-indigo-100/30 p-6 z-20 transform -rotate-2">
<div class="flex items-center gap-4 mb-4">
<div class="w-12 h-12 bg-primary-container/10 rounded-full flex items-center justify-center text-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">calendar_month</span>
</div>
<div>
<div class="text-xs text-on-surface-variant font-label uppercase tracking-widest">Available Slots</div>
<div class="font-headline font-bold text-on-surface">Choose a Time</div>
</div>
</div>
<div class="grid grid-cols-3 gap-2">
<div class="bg-surface-container-high rounded-full py-2 text-center text-xs font-semibold text-primary">09:00</div>
<div class="bg-primary text-white rounded-full py-2 text-center text-xs font-semibold">10:30</div>
<div class="bg-surface-container-high rounded-full py-2 text-center text-xs font-semibold text-primary">14:00</div>
</div>
</div>
<!-- Confirmation Status Card -->
<div class="absolute bottom-[15%] right-[5%] w-[60%] bg-white/80 glass-effect rounded-lg shadow-2xl shadow-indigo-900/10 p-5 z-30 transform rotate-3 border border-white/50">
<div class="flex items-center gap-3">
<div class="w-8 h-8 bg-green-500 rounded-full flex items-center justify-center text-white">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
<span class="text-sm font-bold text-on-surface">Booking Confirmed!</span>
</div>
</div>
<!-- Profile Anchor Image -->
<div class="absolute top-[45%] right-0 w-32 h-40 rounded-xl overflow-hidden shadow-lg transform rotate-6 border-4 border-white">
<img class="w-full h-full object-cover" data-alt="portrait of a professional young woman smiling in a bright airy studio environment with soft natural lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBpvzSC-76M1SV8zWDwC8UdHWOZvfcMCtkrLjU6x18jrJmWK7gQvCUVQhLWe5x9ibce81fk7sRB19AHggTTydqxTXifriZMrF965HrZSbx20APREO0OGf9McwxVFKJH4BaK-RPwLPZ_XUnqeBtlPHb1G5FonDezdbLM6YMCJ0wmmVD8sAd3d8zgbsQkDXEcnDmfBpT3E_SpTPBaFHCyI0L3p2c5AkkxNdLtZTtKFPTqysdCN2EaGQUhBRpCIMLjhoM-bgCMG1PC3xdy"/>
</div>
</div>
</div>
<!-- Content Section -->
<div class="space-y-4 text-center md:text-left">
<h1 class="font-headline text-4xl font-extrabold tracking-tight text-on-surface leading-[1.1]">
                Book appointments <br/>
<span class="bg-gradient-to-r from-primary to-primary-container bg-clip-text text-transparent">in seconds</span>
</h1>
<p class="text-on-surface-variant text-lg leading-relaxed max-w-sm mx-auto md:mx-0">
                Check availability and confirm your booking instantly. Our smart engine handles the rest.
            </p>
</div>
</main>
<!-- Footer Controls -->
<footer class="p-8 pb-12 flex flex-col items-center gap-10">
<!-- Progress Indicators -->
<div class="flex gap-3">
<div class="w-2 h-2 rounded-full bg-outline-variant"></div>
<div class="w-8 h-2 rounded-full bg-primary"></div>
<div class="w-2 h-2 rounded-full bg-outline-variant"></div>
<div class="w-2 h-2 rounded-full bg-outline-variant"></div>
</div>
<!-- Primary Action -->
<div class="w-full max-w-xs flex justify-center">
<button class="w-full py-5 bg-gradient-to-r from-primary to-primary-container text-on-primary font-headline font-bold text-lg rounded-xl shadow-xl shadow-indigo-200/50 hover:opacity-90 active:scale-95 transition-all duration-200 flex items-center justify-center gap-3">
                Continue
                <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</footer>
</body></html>
