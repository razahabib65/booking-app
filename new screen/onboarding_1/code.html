<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-container-high": "#eae6f4",
                    "inverse-on-surface": "#f3effc",
                    "on-error-container": "#93000a",
                    "background": "#fcf8ff",
                    "on-tertiary": "#ffffff",
                    "on-secondary-container": "#454386",
                    "on-primary": "#ffffff",
                    "inverse-primary": "#c3c0ff",
                    "surface-bright": "#fcf8ff",
                    "surface-container-lowest": "#ffffff",
                    "primary-fixed-dim": "#c3c0ff",
                    "secondary-fixed": "#e2dfff",
                    "on-error": "#ffffff",
                    "on-primary-fixed": "#0f0069",
                    "error-container": "#ffdad6",
                    "tertiary-container": "#a44100",
                    "primary-container": "#4f46e5",
                    "surface-container": "#f0ecf9",
                    "outline": "#777587",
                    "secondary-container": "#b6b4ff",
                    "on-background": "#1b1b24",
                    "tertiary-fixed": "#ffdbcc",
                    "on-surface": "#1b1b24",
                    "surface-tint": "#4d44e3",
                    "outline-variant": "#c7c4d8",
                    "on-secondary-fixed-variant": "#413f82",
                    "on-tertiary-fixed-variant": "#7b2f00",
                    "on-primary-fixed-variant": "#3323cc",
                    "tertiary": "#7e3000",
                    "error": "#ba1a1a",
                    "on-secondary-fixed": "#140f54",
                    "primary-fixed": "#e2dfff",
                    "surface-container-highest": "#e4e1ee",
                    "on-secondary": "#ffffff",
                    "surface-dim": "#dcd8e5",
                    "on-primary-container": "#dad7ff",
                    "surface-container-low": "#f5f2ff",
                    "tertiary-fixed-dim": "#ffb695",
                    "primary": "#3525cd",
                    "surface-variant": "#e4e1ee",
                    "on-tertiary-fixed": "#351000",
                    "on-tertiary-container": "#ffd2be",
                    "on-surface-variant": "#464555",
                    "inverse-surface": "#302f39",
                    "surface": "#fcf8ff",
                    "secondary": "#58579b",
                    "secondary-fixed-dim": "#c3c0ff"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Manrope', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface min-h-screen flex flex-col items-center overflow-hidden">
<!-- Hero Illustration Canvas -->
<main class="relative w-full max-w-md h-screen flex flex-col px-8 pt-12 pb-24 overflow-hidden">
<!-- Top Visual: Abstract Asymmetric Composition -->
<div class="relative flex-1 w-full flex items-center justify-center">
<!-- Background Decorative Blobs (Soft Minimalism) -->
<div class="absolute top-0 -left-12 w-64 h-64 bg-primary-container/10 rounded-full blur-3xl"></div>
<div class="absolute bottom-12 -right-8 w-48 h-48 bg-secondary-container/20 rounded-full blur-3xl"></div>
<!-- Main Illustration Component -->
<div class="relative w-full aspect-square z-10 flex items-center justify-center">
<!-- Central Focus Card -->
<div class="relative w-4/5 aspect-[4/5] bg-surface-container-lowest rounded-lg shadow-2xl shadow-on-surface/5 flex flex-col overflow-hidden">
<img class="w-full h-1/2 object-cover" data-alt="Modern minimalist office space with soft indigo lighting, clean lines, and a professional atmosphere, high-end hospitality aesthetic" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBGGomUJ37Rcp5VhLZUARC7YKVROY-NkJkUmebw5G0Di1ENGzP1rJYIgFkGozvZzuMJzoLogmppdIuUlsvCO0kWGva1Bo7GDcNqxVgGHiBW_K0LA3QhULxTKNafWARbGCEoBJMO7pn0Ebu8ImgP8TyAzo-Oss_lHSlDZb-L8zbgot1Oumvzcwur9-FsB7LV2Aw2cl96jNveVa99GHPhOcIQmUS8QE3Q4AovLRaivNdj_tGC80PaWhec8Q4SO1o_JXimhUUyCNRwuLz5"/>
<div class="p-6 space-y-4">
<div class="h-4 w-3/4 bg-surface-container-high rounded-full"></div>
<div class="h-4 w-1/2 bg-surface-container rounded-full"></div>
<div class="flex gap-2 pt-4">
<div class="h-8 w-8 rounded-full bg-primary-container/20"></div>
<div class="h-8 w-8 rounded-full bg-primary-container/20"></div>
<div class="h-8 w-8 rounded-full bg-primary-container/20"></div>
</div>
</div>
<!-- Floating Search Pill Interaction -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-4/5 bg-white/80 backdrop-blur-xl p-4 rounded-xl shadow-xl flex items-center gap-3 border border-outline-variant/10">
<div class="p-2 bg-primary rounded-full text-white">
<span class="material-symbols-outlined text-lg">search</span>
</div>
<div class="flex-1 space-y-1">
<div class="h-2 w-12 bg-primary/20 rounded-full"></div>
<div class="h-3 w-24 bg-on-surface/10 rounded-full"></div>
</div>
</div>
</div>
<!-- Floating Support Elements -->
<div class="absolute top-10 right-0 w-24 h-24 bg-surface-container-highest rounded-xl -rotate-12 shadow-lg flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings: 'FILL' 1;">verified_user</span>
</div>
<div class="absolute bottom-10 -left-4 w-20 h-20 bg-secondary-container/40 backdrop-blur-md rounded-full rotate-6 shadow-md flex items-center justify-center">
<span class="material-symbols-outlined text-secondary text-3xl">event_available</span>
</div>
</div>
</div>
<!-- Content Section -->
<div class="relative z-20 space-y-6 mt-8">
<div class="space-y-4">
<h1 class="text-4xl md:text-5xl font-extrabold tracking-tight text-on-surface leading-[1.1]">
                    Find your service <span class="text-primary italic">easily</span>
</h1>
<p class="text-on-surface-variant text-lg font-medium leading-relaxed max-w-[90%]">
                    Discover the best local professionals for all your needs.
                </p>
</div>
<!-- Action Area -->
<div class="flex flex-col gap-4 pt-4">
<button class="w-full bg-gradient-to-r from-primary to-primary-container text-on-primary py-5 rounded-xl font-bold text-lg shadow-xl shadow-primary/20 active:scale-95 transition-all flex items-center justify-center gap-2">
                    Next
                    <span class="material-symbols-outlined">arrow_forward</span>
</button>
<button class="w-full text-on-surface-variant py-4 font-semibold text-sm hover:text-primary transition-colors">
                    Skip for now
                </button>
</div>
</div>
<!-- Bottom Navigation / Progress Area -->
<div class="absolute bottom-10 left-0 w-full px-8 flex justify-between items-center">
<!-- Progress Indicators -->
<div class="flex gap-2">
<div class="h-2.5 w-8 rounded-full bg-primary transition-all"></div>
<div class="h-2.5 w-2.5 rounded-full bg-surface-container-highest"></div>
<div class="h-2.5 w-2.5 rounded-full bg-surface-container-highest"></div>
</div>
<!-- Contextual Branding Shadow -->
<span class="text-xs font-bold uppercase tracking-widest text-on-surface/20 font-headline">SmartBook</span>
</div>
</main>
<!-- Visual Polish: Top Bar -->
<header class="fixed top-0 left-0 w-full px-8 py-6 z-50 flex justify-between items-center pointer-events-none">
<div class="flex items-center gap-1.5 pointer-events-auto">
<div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-white text-xl" style="font-variation-settings: 'FILL' 1;">book</span>
</div>
<span class="font-black text-xl tracking-tighter text-on-surface">SmartBook</span>
</div>
<div class="pointer-events-auto">
<button class="text-sm font-bold text-primary px-4 py-2 bg-primary/5 rounded-full">
                 Support
             </button>
</div>
</header>
</body></html>
