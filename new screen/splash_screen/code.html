<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SmartBook | Loading</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                        "on-primary-fixed-variant": "#3323cc",

                        "error": "#ba1a1a",

                        "primary-fixed": "#e2dfff",
                        "surface-container-highest": "#e4e1ee",
                        "on-secondary": "#ffffff",
                        "surface-dim": "#dcd8e5",
                        "on-primary-container": "#dad7ff",
                        "surface-container-low": "#f5f2ff",
                        "tertiary-fixed-dim": "#ffb695",
                        "primary": "#3525cd",
                        "surface-variant": "#e4e1ee",
                        "on-tertiary-fixed": "#351000",
                        "on-tertiary-container": "#ffd2be",
                        "on-surface-variant": "#464555",
                        "inverse-surface": "#302f39",

                        "secondary": "#58579b",

                    "borderRadius": {
                        "DEFAULT": "1rem",

                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]

                },
            },
        }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 48;
        }
        .loading-shimmer {
            background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.2) 50%, transparent 100%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body selection:bg-primary-container selection:text-on-primary-container">
<!-- Splash Screen Container -->
<main class="relative h-screen w-full flex flex-col items-center justify-center overflow-hidden bg-gradient-to-br from-primary via-primary to-primary-container">
<!-- Subtle Texture Overlay -->
<div class="absolute inset-0 opacity-10" data-alt="subtle geometric cube pattern texture overlay on a deep indigo background for depth and sophistication" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCOY3no59fTS8PqBMBAxAvViFvCwXXZ8ohLIKi6LsfGultJ-FcISm-W2k_jm72yiMozEVjqeR2AGH9usg3cxMbvyP0M5IBPM9nD0ilwYmbYxjvbxWuHwJVLuP05dsVW3TcYOlPCQhIUJCeUWlW-f5Zse8T2qSfIJ-KLodma5o2Gx4Vu5--V0FZE8tpg5lPaTgQvUp3nSDTeV3ALZdKEZS9J_J0tawUAhQjviXrtNFIjAXf8n__z4gRaIt7PkhUwfyec5W6s2brQ9yJ8');"></div>
<!-- Decorative Background Glows -->
<div class="absolute -top-24 -left-24 w-96 h-96 bg-secondary-container opacity-20 rounded-full blur-[120px]"></div>
<div class="absolute -bottom-24 -right-24 w-96 h-96 bg-on-primary-container opacity-20 rounded-full blur-[120px]"></div>
<!-- Center Content -->
<div class="relative z-10 flex flex-col items-center text-center">
<!-- Logo Icon Container -->
<div class="mb-8 p-6 bg-white/10 backdrop-blur-xl rounded-xl shadow-2xl shadow-primary/20 ring-1 ring-white/20">
<span class="material-symbols-outlined text-on-primary text-6xl" data-icon="book_online">
                    book_online
                </span>
</div>
<!-- Brand Typography -->
<!-- Using style_brand_logo key from JSON as guidance, adapted for dark background contrast -->
<h1 class="text-on-primary font-headline text-5xl font-black tracking-tighter mb-2">
                SmartBook
            </h1>
<!-- Tagline -->
<p class="text-on-primary-container/80 font-body text-lg font-light tracking-wide">
                Your Digital Concierge
            </p>
</div>
<!-- Bottom Loading Indicator -->
<div class="fixed bottom-24 left-0 w-full flex flex-col items-center gap-4 px-12 max-w-md mx-auto">
<!-- Loading Track -->
<div class="w-full h-1 bg-white/10 rounded-full overflow-hidden">
<div class="loading-shimmer w-full h-full"></div>
</div>
<!-- Contextual Status -->
<span class="text-on-primary/40 font-label text-[10px] uppercase tracking-[0.2em] font-semibold">
                Authenticating Experience
            </span>
</div>
<!-- Decorative Footer Element -->
<div class="fixed bottom-12 flex items-center gap-2 opacity-30">
<span class="material-symbols-outlined text-on-primary text-sm" data-icon="shield_with_heart" style="font-variation-settings: 'FILL' 1;">
                shield_with_heart
            </span>
<span class="text-on-primary font-label text-[10px] tracking-widest uppercase">
                Secure &amp; Private
            </span>
</div>
</main>
<!-- Navigation shells (TopAppBar, BottomNavBar) are suppressed for Splash Screen as per "The Destination Rule" and "Automatic Suppression" logic -->
</body></html>
