<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
                  "surface-container-high": "#eae6f4",
                  "inverse-on-surface": "#f3effc",
                  "on-error-container": "#93000a",
                  "background": "#fcf8ff",
                  "on-tertiary": "#ffffff",
                  "on-secondary-container": "#454386",
                  "on-primary": "#ffffff",
                  "inverse-primary": "#c3c0ff",
                  "surface-bright": "#fcf8ff",
                  "surface-container-lowest": "#ffffff",
                  "primary-fixed-dim": "#c3c0ff",
                  "secondary-fixed": "#e2dfff",
                  "on-error": "#ffffff",
                  "on-primary-fixed": "#0f0069",
                  "error-container": "#ffdad6",
                  "tertiary-container": "#a44100",
                  "primary-container": "#4f46e5",
                  "surface-container": "#f0ecf9",
                  "outline": "#777587",
                  "secondary-container": "#b6b4ff",
                  "on-background": "#1b1b24",
                  "tertiary-fixed": "#ffdbcc",
                  "on-surface": "#1b1b24",
                  "surface-tint": "#4d44e3",
                  "outline-variant": "#c7c4d8",
                  "on-secondary-fixed-variant": "#413f82",
                  "on-tertiary-fixed-variant": "#7b2f00",
                  "on-primary-fixed-variant": "#3323cc",
                  "tertiary": "#7e3000",
                  "error": "#ba1a1a",
                  "on-secondary-fixed": "#140f54",
                  "primary-fixed": "#e2dfff",
                  "surface-container-highest": "#e4e1ee",
                  "on-secondary": "#ffffff",
                  "surface-dim": "#dcd8e5",
                  "on-primary-container": "#dad7ff",
                  "surface-container-low": "#f5f2ff",
                  "tertiary-fixed-dim": "#ffb695",
                  "primary": "#3525cd",
                  "surface-variant": "#e4e1ee",
                  "on-tertiary-fixed": "#351000",
                  "on-tertiary-container": "#ffd2be",
                  "on-surface-variant": "#464555",
                  "inverse-surface": "#302f39",
                  "surface": "#fcf8ff",
                  "secondary": "#58579b",
                  "secondary-fixed-dim": "#c3c0ff"
          },
          "borderRadius": {
                  "DEFAULT": "1rem",
                  "lg": "2rem",
                  "xl": "3rem",
                  "full": "9999px"
          },
          "fontFamily": {
                  "headline": ["Manrope"],
                  "body": ["Inter"],
                  "label": ["Inter"]
          }
        },
      },
    }
  </script>
<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .glass-effect {
      backdrop-filter: blur(20px);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body selection:bg-primary-container selection:text-on-primary-container min-h-screen flex flex-col">
<main class="flex-grow flex items-center justify-center px-6 py-12 relative overflow-hidden">
<!-- Decorative background elements following "Digital Concierge" soft minimalism -->
<div class="absolute top-[-10%] right-[-5%] w-[400px] h-[400px] rounded-full bg-surface-container blur-[100px] -z-10"></div>
<div class="absolute bottom-[-10%] left-[-5%] w-[300px] h-[300px] rounded-full bg-primary-container/10 blur-[80px] -z-10"></div>
<div class="w-full max-w-md">
<!-- Logo/Brand Anchor -->
<div class="text-center mb-12">
<h1 class="text-xl font-black text-indigo-700 dark:text-indigo-300 tracking-tighter font-headline">SmartBook</h1>
</div>
<!-- Reset Password Card -->
<div class="bg-surface-container-low rounded-xl p-8 md:p-10 shadow-sm shadow-indigo-100/20">
<div class="mb-8">
<h2 class="text-3xl font-extrabold font-headline text-on-surface tracking-tight mb-3">Reset Password</h2>
<p class="text-on-surface-variant text-sm leading-relaxed">
            Enter your email to receive a reset link.
          </p>
</div>
<form action="#" class="space-y-6">
<div class="space-y-2">
<label class="block text-[11px] font-semibold tracking-wide uppercase text-on-secondary-fixed-variant ml-1 font-label" for="email">
              Email Address
            </label>
<div class="relative group">
<input class="w-full bg-surface-container-lowest border-none focus:ring-0 focus:bg-surface-container-high transition-all duration-300 rounded-lg px-4 py-4 text-on-surface placeholder:text-outline-variant font-body" id="email" name="email" placeholder="hello@example.com" required="" type="email"/>
<div class="absolute bottom-0 left-1/2 -translate-x-1/2 w-0 h-[2px] bg-primary transition-all duration-300 group-focus-within:w-full"></div>
</div>
</div>
<button class="w-full bg-gradient-to-r from-primary to-primary-container text-on-primary font-bold py-4 rounded-xl shadow-lg shadow-primary/20 active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2" type="submit">
            Send Reset Link
            <span class="material-symbols-outlined text-xl" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<div class="mt-10 text-center">
<a class="inline-flex items-center gap-2 text-primary font-semibold hover:text-on-primary-fixed-variant transition-colors duration-200 group" href="#">
<span class="material-symbols-outlined text-lg group-hover:-translate-x-1 transition-transform" data-icon="keyboard_backspace">keyboard_backspace</span>
<span class="text-sm font-label uppercase tracking-wider">Back to login</span>
</a>
</div>
</div>
<!-- Social Support / Tertiary Info Section -->
<div class="mt-12 grid grid-cols-1 gap-6">
<div class="bg-surface-container/50 rounded-lg p-6 flex items-start gap-4">
<div class="p-3 bg-white rounded-full">
<span class="material-symbols-outlined text-primary" data-icon="lock_reset" data-weight="fill" style="font-variation-settings: 'FILL' 1;">lock_reset</span>
</div>
<div>
<h3 class="font-headline font-bold text-on-surface text-sm">Secure Recovery</h3>
<p class="text-xs text-on-surface-variant mt-1 leading-relaxed">We use industry-standard encryption to ensure your account security is never compromised during recovery.</p>
</div>
</div>
</div>
<!-- Footer Help -->
<p class="mt-12 text-center text-xs text-outline font-medium tracking-wide">
        Need immediate help? 
        <a class="text-primary hover:underline underline-offset-4" href="#">Contact Support</a>
</p>
</div>
</main>
<!-- Floating Decoration for Mobile Aesthetic -->
<div class="fixed top-12 left-12 w-24 h-24 bg-tertiary-container/5 rounded-full blur-2xl -z-10"></div>
<div class="fixed bottom-24 right-12 w-32 h-32 bg-primary/5 rounded-full blur-3xl -z-10"></div>
</body></html>
